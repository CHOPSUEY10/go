
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Uji Coba WebSocket</title>
</head>
<body>
    <h1>Membuka Koneksi WebSocket...</h1>
    <form name="myForm"> 
        <label for="fname" style="margin-bottom:1em">Pesan : </label><br>
        <input type="text" id="fname" name="msg"><br>
        <input type="submit" value="Submit" style="margin-top:1em">
    </form>

    <script>
        // Script Anda diletakkan di sini
        let socket = new WebSocket("ws://localhost:3000/ws");

        socket.onopen = () => {
            console.log("Koneksi berhasil terhubung!");
        };

        socket.onmessage = (event) => {
            console.log("received from the server :", event.data);
        };

        const myForm = document.querySelector("[name=myForm]")

        const msg = document.querySelector("[name=msg]")
        myForm.addEventListener('submit', async (event) => {
            // Prevent the default browser page refresh
            if (msg.value.trim() !== "") {
                socket.send(msg.value);
        
                // Opsional: Kosongkan kolom input setelah mengirim pesan
                msg.value = ""; 
            }
            
        });


        socket.onerror = (error) => {
            console.error("Terjadi error:", error);
        };
    </script>
</body>
</html>
